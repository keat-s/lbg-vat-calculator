# Defines a virtual server block — the configuration for one site/app.
server {
    # Listen for incoming HTTP connections on port 80.
    listen 80;

    # Rules for the root path and everything under it.
    location / {
        # Directory nginx serves files from.
        root /usr/share/nginx/html;

        # Files to look for when a directory is requested (in order).
        index index.html index.htm;

        # Try to serve the requested file ($uri), then as a directory
        # ($uri/), and if neither exists, fall back to /index.html.
        # This is what makes single-page-app (SPA) client-side routing work:
        # any unknown route is handed to index.html instead of 404ing.
        try_files $uri $uri/ /index.html;
    }

    # Map server-side error codes (500, 502, 503, 504) to a custom page.
    error_page 500 502 503 504 /50x.html;

    # Serve the error page itself from the web root.
    # "location =" means an exact match for /50x.html only.
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
